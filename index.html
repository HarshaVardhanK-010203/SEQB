                    diag: "[Decision Node] --(T)--> [Path A]\n      |           --(F)--> [Path B]\n[Loop Start] <--(Iterate)---+",
                    ex: "In a 'Discount Code' verification, condition testing checks both valid and expired codes, while loop testing ensures that a list of 10 applied codes is processed exactly 10 times without skipping the last one.",
                    conc: "In summary, condition and loop testing provides deep structural assurance. By methodically verifying the 'Small Logic' of decisions and iterations, these techniques ensure that the software foundation is free of common logical pitfalls."
                }
            },
            {
                id: "m5-2-1", module: 5, marks: 2,
                q: "What is Software Maintenance and its types?",
                ans: "Software maintenance is the process of modifying software after delivery. Types include: 1. Corrective (fixing bugs), 2. Adaptive (updating for environment changes), 3. Perfective (adding new features), and 4. Preventive (refactoring to avoid future problems)."
            },
            {
                id: "m5-2-2", module: 5, marks: 2,
                q: "Define Software Configuration Management (SCM).",
                ans: "SCM is a set of activities designed to control change by identifying the products that are likely to change, establishing relationships among them, defining mechanisms for managing different versions, and auditing the changes made."
            },
            {

                q: "What is Software Project Estimation?",

            },
            {
                id: "m5-2-4", module: 5, marks: 2,
                q: "Define COCOMO model.",
                ans: "COCOMO (Constructive Cost Model) is an algorithmic model used to estimate the effort and duration of a software project based on size (usually thousands of source lines of code - KSLOC) and various cost drivers like complexity and reliability."
            },
            {
                id: "m5-2-5", module: 5, marks: 2,
                q: "What are the activities of Risk Management?",
                ans: "Risk management activities include: 1. Risk Identification, 2. Risk Projection/Assessment, 3. Risk Refinement, 4. Risk Mitigation, Monitoring, and Management (RMMM)."
            },
            {
                id: "m5-8-1", module: 5, marks: 8,
                q: "Explain about Risk Management in Software Engineering.",
                ans: {
                    def: "Risk management is a systematic process of identifying, analyzing, and responding to project risks to minimize their negative impact on the software life cycle. It is a proactive approach that allows project managers to anticipate problems before they occur.",
                    points: [
                        { name: "Risk Identification", desc: "A continuous task where the team lists potential threats to the project schedule, budget, or product quality. This involves brainstorming, reviewing historical data, and using specialized checklists to ensure that no technical or organizational vulnerability is overlooked." },
                        { name: "Risk Assessment", desc: "Evaluating each identified risk to determine its probability of occurrence and its potential impact on the overall project success. Results are documented in a risk table, which helps in understanding which threats pose the greatest danger to the project's health." },
                        { name: "Risk Prioritization", desc: "Ranking risks based on their severity so the management team can allocate resources effectively. High-priority risks receive immediate attention and detailed planning, while low-priority risks are monitored periodically to ensure they do not escalate over time." },
                        { name: "Risk Mitigation", desc: "Developing specific strategies to reduce the probability of the risk occurring or to minimize its damaging effects. This might involve assigning more experienced staff to complex tasks or choosing more stable technologies to reduce technical uncertainty." },
                        { name: "Risk Monitoring", desc: "Continuously tracking the identified risks to check if the mitigation strategies are working. Project managers look for 'risk triggers' that indicate a threat is becoming a reality, allowing for rapid response and adjustment of project plans." },
                        { name: "Contingency Planning", desc: "Creating detailed 'Plan B' actions that can be triggered immediately if a risk becomes an actual problem. This ensures that the team can recover quickly from setbacks without excessive delay, maintaining the momentum of the development process." }
                    ],
                    diag: "[Identify] --> [Analyze] --> [Prioritize] --> [Plan Strategy] \n    ^                                                   | \n    |                                                   V \n    +--------------- [Track & Monitor] <----------------+",
                    ex: "If a project depends on a third-party API, the risk 'Service Downtime' is identified. Mitigation involves creating a local cache, while the contingency plan is to switch to a secondary provider if the primary service fails for over four hours.",
                    conc: "Effective risk management transforms a reactive development team into a proactive and resilient one. By systematically addressing uncertainties, project leaders can significantly increase the probability of delivering high-quality software within the established constraints."
                }
            },
            {
                id: "m5-8-2", module: 5, marks: 8,
                q: "Summarize Software Configuration Management (SCM).",
                ans: {
                    def: "Software Configuration Management (SCM) is a discipline that identifies the configuration of software at distinct points in time and systematically controls changes to that configuration. It ensures the integrity and traceability of the software throughout its lifecycle.",
                    points: [
                        { name: "Configuration Identification", desc: "Involves defining the specific items that make up a software system (e.g., source code, design documents, test cases). Each item is given a unique identifier and version number so it can be tracked and managed individually." },
                        { name: "Version Control", desc: "The process of managing multiple versions of software components as they evolve. It allows developers to work on the code simultaneously without overwriting each other's changes, providing a historical record of all modifications." },
                        { name: "Change Control", desc: "A formal process for requesting, evaluating, and approving changes to the software configuration. It ensures that only authorized changes are made and that the impact of every modification is understood before it is implemented." },
                        { name: "Configuration Auditing", desc: "The process of verifying that the software configuration matches the established baseline. It ensures that all approved changes have been correctly implemented and that the technical documentation is up to date." },
                        { name: "Status Accounting", desc: "A recording and reporting activity that provides information about the state of the configuration items. It tracks 'what happened, who did it, and when,' providing a transparent view of the project's evolution for all stakeholders." },
                        { name: "Release Management", desc: "The planning and control of the release process, ensuring that the correct versions of all components are bundled together and deployed to the target environment safely and reliably." }
                    ],
                    diag: "[Source Code] + [Docs] + [Tests] --(SCM)--> [Versioned Baseline]\n                                         |\n                                 (Change Control Logic)",
                    ex: "Using 'Git' to track changes in a web project is a core SCM activity. It identifies that 'Version 1.2' includes a specific set of files and ensures that any new feature is developed in a separate 'branch' before being audited.",
                    conc: "In conclusion, SCM is the 'safety net' of software engineering. By providing absolute control over changes and ensuring complete traceability, it allows large teams to collaborate effectively while maintaining the system's structural integrity."
                }
            },
            {
                id: "m5-2-6", module: 5, marks: 2,
                q: "Define Software Quality.",
                ans: "Software quality is the degree to which a software system, component, or process meets specified requirements and customer or user needs/expectations. It is often measured by attributes like reliability, usability, efficiency, and maintainability."
            },
            {
                id: "m5-2-7", module: 5, marks: 2,
                q: "What is CASE (Computer Aided Software Engineering)?",
                ans: "CASE is the use of software-based tools to assist in the development and maintenance of software. These tools help automate various activities in the software life cycle, such as design, coding, testing, and project management."
            },
            {
                id: "m5-2-8", module: 5, marks: 2,
                q: "Define Software Reliability.",
                ans: "Software reliability is the probability that a software system will perform its intended functions correctly and without failure for a specified period of time in a specified environment."
            },
            {
                id: "m5-2-9", module: 5, marks: 2,
                q: "What is a Gantt Chart?",
                ans: "A Gantt chart is a type of bar chart used in project management to illustrate a project schedule. It shows the start and finish dates of the terminal elements and summary elements of a project, helping to visualize the project timeline."
            },
            {
                id: "m5-2-10", module: 5, marks: 2,
                q: "Define the term 'Risk'.",
                ans: "In software engineering, a risk is an uncertain event or condition that, if it occurs, has a negative effect on at least one project objective, such as scope, schedule, cost, or quality."
            },
            {
                id: "m5-8-3", module: 5, marks: 8,
                q: "Discuss various Project Estimation Techniques.",
                ans: {
                    def: "Software project estimation is the process of predicting the most realistic amount of effort, cost, and duration required to complete a software project. Accurate estimation is critical for effective planning and resource allocation.",
                    points: [
                        { name: "Expert Judgment", desc: "Relies on the experience and knowledge of experts who have worked on similar projects in the past. While subjective, it can be highly effective when the experts have deep domain knowledge and use historical data for reference." },
                        { name: "Analogy-Based Estimation", desc: "Involves comparing the current project with similar past projects (analogues) to derive estimates. The team identifies key similarities and differences, adjusting the past project's actual effort to fit the current requirements." },
                        { name: "Decomposition Technique", desc: "A 'Bottom-Up' approach where the project is broken down into small, manageable tasks (Work Breakdown Structure). Estimated effort for each task is then aggregated to find the total project effort, increasing accuracy through granularity." },
                        { name: "Parametric Modeling", desc: "Uses mathematical models to calculate estimates based on project parameters like Size (Lines of Code) or Functionality (Function Points). Models like COCOMO use statistical relationships developed from historical project data." },
                        { name: "Function Point Analysis", desc: "Estimates project size based on the functionality delivered to the user rather than the lines of code. It counts inputs, outputs, queries, and files, providing a measure that is independent of the programming language used." },
                        { name: "Three-Point Estimation", desc: "Calculates an average estimate using three values: Optimistic (best case), Most Likely, and Pessimistic (worst case). This PERT (Program Evaluation and Review Technique) approach helps manage uncertainty and provides a more realistic range." }
                    ],
                    diag: "[Historical Data] --(Analyze)--> [Estimation Model] --(Input Size)--> [Project Estimate]\n                                     |\n                            (Expert Review/Tune)",
                    ex: "A manager uses 'Analogy-Based Estimation' by comparing a new 'Inventory System' to a 'Sales Portal' built last year, noting that the new system has 20% more database tables and adjusting the timeline accordingly.",
                    conc: "In summary, no single estimation technique is perfect. Using a combination of 'Expert Judgment' and 'Parametric Modeling' often provides the most reliable estimates, allowing project managers to set realistic expectations for stakeholders."
                }
            },
            {
                id: "m5-8-4", module: 5, marks: 8,
                q: "Elaborate on COCOMO II Model for estimation.",
                ans: {
                    def: "COCOMO II (Constructive Cost Model II) is a modernized version of the original COCOMO model, designed to estimate the effort, cost, and schedule of contemporary software projects. It accounts for modern development practices like object-oriented design and reuse.",
                    points: [
                        { name: "Application Composition", desc: "Used for projects built with modern GUI builders and object-oriented tools. This model uses 'Object Points' (a count of screens and reports) as a measure of size, making it suitable for rapid prototyping projects." },
                        { name: "Early Design Model", desc: "Applied after the requirements are understood but before the architecture is finalized. It uses 'Function Points' and a simplified set of cost drivers (like platform difficulty and personnel capability) to provide initial estimates." },
                        { name: "Post-Architecture Model", desc: "The most detailed model, used after the architectural design is complete. It uses 'Source Lines of Code' (SLOC) or Function Points, along with 17 detailed cost drivers to provide high-precision estimates for construction." },
                        { name: "Cost Drivers (EMs)", desc: "Includes 'Effort Multipliers' that account for product, platform, personnel, and project attributes. Factors like high reliability requirements or low developer experience significantly increase the estimated effort required for completion." },
                        { name: "Scale Factors (SFs)", desc: "Addresses issues like process maturity, team cohesion, and architectural resolution. These factors reflect the overall organizational capability, where a highly mature process can reduce the total effort needed for a complex project." },
                        { name: "Continuous Tuning", desc: "COCOMO II is designed to be calibrated with an organization's specific historical data. By adjusting the model's coefficients based on past project performance, teams can significantly improve the accuracy of future estimations." }
                    ],
                    diag: "[Size KSLOC] x [Effort Multipliers] ^ [Scale Factors] = [Person-Months Effort]\n                                            |\n                                    (Result: Schedule)",
                    ex: "A project with 50,000 lines of code (KSLOC=50) would have its effort adjusted upwards if the 'Reliability' EM is high (e.g., x1.2) and downwards if the 'Team Capability' EM is very high (e.g., x0.8).",
                    conc: "In conclusion, COCOMO II remains one of the most widely used algorithmic estimation models in the industry. Its ability to account for both technical and human factors makes it an essential tool for project planning and resource management."
                }
            },
            {
                id: "m5-8-5", module: 5, marks: 8,
                q: "Write a brief note on Software Maintenance Process.",
                ans: {
                    def: "The software maintenance process involves the activities required to provide cost-effective support and improvement after a product has been delivered. It ensures that the software continues to meet user needs as the operational environment changes.",
                    points: [
                        { name: "Initial Request", desc: "The process begins when a user reports a bug, requests a new feature, or identifies a need for performance improvement. Every request is documented and tracked in a maintenance log to ensure accountability and traceability." },
                        { name: "Impact Analysis", desc: "Engineers evaluate the proposed change to determine its effect on the existing system. They identify which modules will be modified and assess the potential risk of breaking unrelated functionality, helping in resource planning." },
                        { name: "Design and Coding", desc: "Once a change is approved, the team develops the technical solution. This involves updating design documents and writing the code, ensuring that the new logic is consistent with the established architectural patterns of the application." },
                        { name: "Regression Testing", desc: "Crucial for maintenance, this phase involves re-testing the system to ensure that the modifications haven't introduced new bugs. It verifies that the software still performs its original functions correctly after the patch is applied." },
                        { name: "Acceptance Testing", desc: "The modified software is reviewed by users or quality assurance teams to verify that it meets the specific goals of the maintenance request. This ensures that the 'fix' or 'improvement' actually satisfies the customer." },
                        { name: "Release and Update", desc: "The final step involves deploying the updated version to the production environment. This includes updating version labels in the SCM system and notifying users of the changes through release notes or updated documentation." }
                    ],
                    diag: "[Request] -> [Analyze] -> [Modify] -> [Regression Test] -> [Deploy]\n      ^                                                       |\n      +----------------------- (Endless Loop) -----------------+",
                    ex: "An email client developer receives a request to support 'Dark Mode.' Following impact analysis, they modify the CSS components and perform regression testing on existing themes before release.",
                    conc: "In conclusion, software maintenance is an ongoing and essential part of the software lifecycle. A disciplined maintenance process ensures that the software remains valuable and functional for users long after its initial deployment."
                }
            },
            {
                id: "m5-8-6", module: 5, marks: 8,
                q: "Explain about CASE tools and their importance.",
                ans: {
                    def: "Computer-Aided Software Engineering (CASE) tools are a suite of software applications used to automate and support different phases of the software development lifecycle.",
                    points: [
                        { name: "Upper-CASE Tools", desc: "Focus on the early stages of development, including requirements engineering and architectural design. They provide visual modeling environments that help engineers create consistent blueprints." },
                        { name: "Lower-CASE Tools", desc: "Support the later lifecycle phases, such as coding, testing, and maintenance. Examples include compilers, debuggers, and automated test runners that help developers implement software efficiently." },
                        { name: "Integrated CASE (I-CASE)", desc: "A platform that combines upper and lower CASE tools into a single environment. This ensures seamless data transfer between phases, allowing a design model to be automatically 'forward-engineered'." },
                        { name: "Enforcing Standards", desc: "CASE tools force the development team to adhere to specific engineering standards and notations. This improves the consistency of the project artifacts across the enterprise." },
                        { name: "Error Detection", desc: "Many CASE tools include automated checks for logical errors and architectural inconsistencies. For example, a design tool can flag a 'dangling' database relationship early." },
                        { name: "Automated Documentation", desc: "The ability to generate technical documentation from source code or design models. This ensures that the project's documentation is always up-to-date and accurate." }
                    ],
                    diag: "[CASE Environment]\n  |-- [Modeling Tool] -> [Design Specs]\n  |-- [Code Generator] -> [Skeleton Code]\n  |-- [Testing Suite] -> [Quality Reports]",
                    ex: "Using 'Rational Rose' for UML modeling and 'Visual Studio' with integrated test runners significantly speeds up the development of complex enterprise software.",
                    conc: "In conclusion, CASE tools are essential for professional software engineering. By automating repetitive tasks and enforcing rigorous standards, they allows teams to build higher-quality software faster."
                }
            },
            {
                id: "m5-8-7", module: 5, marks: 8,
                q: "Discuss the various activities involved in Software Project Planning.",
                ans: {
                    def: "Software project planning is the process of defining the project's objectives, determining the necessary resources, and establishing a roadmap for execution.",
                    points: [
                        { name: "Defining Scope", desc: "Determining the boundaries of the project by listing what will (and will not) be included in the final product. A clear scope statement prevents 'scope creep' and keeps the team focused." },
                        { name: "Effort Estimation", desc: "Using techniques like COCOMO or Function Point Analysis to predict the resources required. This step establishes the project's budget and manpower needs early on." },
                        { name: "Resource Allocation", desc: "Identifying and bringing together the people, hardware, and software tools required for the project. This includes assigning roles based on their specific expertise." },
                        { name: "Scheduling", desc: "Creating a detailed timeline that shows when each task should be started and finished. Milestones are established to mark major achievement like 'Design Complete'." },
                        { name: "Risk Assessment", desc: "Identifying potential threats to the project's success and developing mitigation strategies. This proactive approach ensures the team is prepared for problems like staff turnover." },
                        { name: "Quality Planning", desc: "Defining the quality standards the project must meet and the specific metrics used to measure them. It includes planning for SQA activities like reviews and audits." }
                    ],
                    diag: "[Obj] -> [Scope] -> [Estimate] -> [Schedule] -> [Allocate] -> [Monitor]\n                                   |\n                            (Project Baseline)",
                    ex: "Planning a mobile app involves defining the 'MVP' scope, estimating it will take 3 months, and assigning two senior React Native developers to the core components.",
                    conc: "In summary, thorough project planning is the primary driver of project success. By establishing a clear baseline and anticipating potential challenges, project managers ensure timely and quality delivery."
                }
            },
            {
                id: "m5-8-8", module: 5, marks: 8,
                q: "Elaborate on Software Quality Assurance (SQA) activities.",
                ans: {
                    def: "Software Quality Assurance (SQA) is a systematic set of activities aimed at ensuring that the software development process and the resulting product meet the specified quality standards.",
                    points: [
                        { name: "Standards Setting", desc: "Defining the technical standards, project procedures, and documentation guidelines that the development team must follow. This ensures consistency and predictability across the software lifecycle." },
                        { name: "Formal Technical Reviews", desc: "Conducting structured meetings where engineers review each other's work (design, code, tests) to identify defects early. Reviews are one of the most effective ways to find logic errors before they become expensive to fix." },
                        { name: "Software Testing", desc: "Planning and executing a multi-level testing strategy (Unit, Integration, System, Acceptance). SQA ensures that the testing is rigorous enough to verify both functional and non-functional requirements." },
                        { name: "Change Management Audits", desc: "Verifying that the Software Configuration Management (SCM) processes are being followed. Audits ensure that only approved changes reach production and that the system's integrity is maintained." },
                        { name: "Process Monitoring", desc: "Continuously observing the development process to ensure it adheres to the selected methodology (e.g., Agile, Waterfall). SQA identifies bottlenecks or deviations and suggests process improvements." },
                        { name: "Collection of Metrics", desc: "Gathering and analyzing data on software quality (e.g., defect density, test coverage). Metrics provide an objective way to measure the 'health' of the project and the effectiveness of the quality assurance activities." }
                    ],
                    diag: "[Dev Process] --(Audit/Review)--> [Quality Product]\n      ^                                  |\n      +---------- (Feedback Loop) --------+",
                    ex: "In a medical software project, SQA involves double-blind code reviews and strict adherence to ISO standards to ensure the safety and reliability of the code before clinical trials.",
                    conc: "In conclusion, SQA is not just 'testing'—it is a comprehensive management strategy. By focusing on both process and product, SQA significantly reduces the risk of failure and ensures long-term software maintainability."
                }
            },
            {
                id: "m5-8-9", module: 5, marks: 8,
                q: "Explain about Software Project Scheduling and tracking.",
                ans: {
                    def: "Software project scheduling is the process of distributing estimated effort across a project timeline and assigning it to specific tasks. Tracking involves monitoring the actual progress against the planned schedule to ensure the project stays on course.",
                    points: [
                        { name: "Task Decomposition", desc: "Breaking down the project into small, manageable work units. This allows for more accurate time estimation and makes it easier to assign specific responsibilities to individual team members." },
                        { name: "Interdependency Identification", desc: "Determining the relationships between tasks (e.g., Task B cannot start until Task A is finished). Understanding these dependencies is critical for building a realistic and efficient project timeline." },
                        { name: "Time Allocation", desc: "Assigning start and end dates to each task based on the estimated effort and available resources. Project managers use Gantt charts or network diagrams to visualize the flow of work over time." },
                        { name: "Milestone Definition", desc: "Establishing clear checkpoints (milestones) throughout the schedule. Milestones represent major achievements and provide a simple way for stakeholders to understand the project's current status." },
                        { name: "Progress Tracking", desc: "Regularly comparing the 'actual' work completed with the 'planned' schedule. This involves weekly status meetings, burn-down charts, or automated tracking tools to identify delays as soon as they occur." },
                        { name: "Schedule Adjustment", desc: "If a delay is detected, the project manager must adjust the schedule by reallocating resources or negotiating scope. This 'Adaptive Scheduling' ensures that the project remains under control despite unexpected setbacks." }
                    ],
                    diag: "[Task List] -> [Dependencies] -> [Timeline/Gantt] -> [Track Progress] \n                                     |\n                             (Identify Critical Path)",
                    ex: "For a mobile app, the schedule might show that 'API Development' must be 50% complete before 'Frontend Integration' can begin. Tracking identifies if the API team is lagging, allowing for early resource adjustment.",
                    conc: "In summary, effective scheduling and tracking provide the 'visibility' needed to manage complex software projects. By continuously monitoring performance, teams can ensure that they meet their deadlines without sacrificing quality."
                }
            },
            {
                id: "m5-8-10", module: 5, marks: 8,
                q: "Discuss in detail about Software Reverse Engineering.",
                ans: {
                    def: "Software Reverse Engineering is the process of analyzing a software system to identify its components and their interrelationships, and to create representations of the system in another form or at a higher level of abstraction. It is often used to understand legacy code.",
                    points: [
                        { name: "Abstraction Recovery", desc: "Involves extracting high-level design information (like class diagrams or data flows) from the low-level source code. This helps developers understand the 'big picture' of a system that may have no existing documentation." },
                        { name: "Code Analysis", desc: "The team uses automated tools to scan the source code and map out the control flow and data dependencies. This identifies how different modules interact and where the most critical logic resides within the application." },
                        { name: "Documentation Generation", desc: "Creating a new set of technical documents that accurately reflect the current state of the software. This is essential for maintaining legacy systems where the original developers are no longer available." },
                        { name: "Refining Architecture", desc: "Identifying architectural flaws or 'Technical Debt' by analyzing the structure of the recovered design. Reverse engineering allows teams to plan for refactoring or modernization by highlighting problematic areas." },
                        { name: "Understanding Data Structures", desc: "Mapping out the internal database schemas and data formats used by the system. This is critical for data migration projects or when integrating a legacy system with a modern application." },
                        { name: "Vulnerability Discovery", desc: "Security experts use reverse engineering to find hidden flaws or 'Backdoors' in software, especially when the source code is not available (Binary Analysis). This helps in hardening systems against potential cyber-attacks." }
                    ],
                    diag: "[Machine Code/Source] --(Analyze)--> [Low-Level Logic] --(Abstract)--> [High-Level Design]\n                                            |\n                                       (Target: Understanding)",
                    ex: "A company reverse-engineers a 15-year-old COBOL banking system to understand its interest calculation logic before rewriting the same functionality in Java for a new cloud platform.",
                    conc: "In conclusion, reverse engineering is a powerful tool for knowledge recovery. While it is resource-intensive, it is often the only way to safeguard the intellectual property embedded in undocumented legacy software systems."
                }
            },
            {
                id: "m5-8-11", module: 5, marks: 8,
                q: "Summarize ISO 9000 Quality Standards for Software.",
                ans: {
                    def: "ISO 9000 is an international family of standards for quality management and quality assurance. Specifically, ISO 9001 and the 9000-3 guidelines describe the requirements for a software development organization to achieve a 'Certified' quality process.",
                    points: [
                        { name: "Process Consistency", desc: "The standards mandate that an organization must document its entire design and development process. This ensures that every project follows a predictable, high-quality path rather than relying on individual heroics." },
                        { name: "Customer Focus", desc: "ISO 9000 requires clear mechanisms for capturing and validating user requirements. It ensures that the project team is building exactly what the customer needs and provides a clear path for resolving complaints." },
                        { name: "Documentation Control", desc: "Strong emphasis on versioning and auditing all project documents. Every change must be tracked and approved, ensuring that the team is always working from the latest, most accurate technical specifications." },
                        { name: "Corrective Actions", desc: "Organizations must have a formal process for identifying the root cause of quality failures (bugs/delays) and taking steps to prevent them from happening in future projects, promoting a culture of learning." },
                        { name: "Periodic Audits", desc: "Both internal and external audits are required to verify that the SQA processes are actually being followed in daily practice. This prevents the 'Quality Manual' from becoming shelf-ware that no one actually uses." },
                        { name: "Management Responsibility", desc: "Quality is treated as a leadership issue. Senior management must provide the resources (tools/training) needed for SQA and must be actively involved in reviewing the effectiveness of the quality system." }
                    ],
                    diag: "[Requirements] -> [Documented Process] -> [Internal Audit] -> [ISO Cert]\n      ^                                                       |\n      +--------------------------- (Improvement Loop) --------+",
                    ex: "A software firm seeking ISO 9001 certification must prove that their 'Bug Tracking' and 'Version Control' systems are used consistently across all 50 of their current development projects.",
                    conc: "In conclusion, ISO 9000 provides a global 'Stamp of Approval' for software quality. While it requires significant documentation effort, it pays off by reducing errors, increasing customer trust, and creating a more efficient development team."
                }
            },
            {
                id: "m5-8-12", module: 5, marks: 8,
                q: "Distinguish between Reactive and Proactive Risk Strategies.",
                ans: {
                    def: "Risk management strategies define how a team anticipates and responds to project threats. Reactive strategies focus on 'Firefighting' problems after they occur, while Proactive strategies focus on 'Prevention' and early planning.",
                    points: [
                        { name: "Reactive: Firefighting", desc: "The team only addresses risks when they become actual problems (crises). This approach is often characterized by high stress, wasted resources, and serious project delays or quality compromises." },
                        { name: "Proactive: Avoidance", desc: "Starts long before technical work begins. The team identifies potential risks and adjusts the project plan to avoid them entirely (e.g., choosing a stable library instead of a experimental one)." },
                        { name: "Risk Identification", desc: "Proactive strategies use systematic brainstorming and historical data to list threats early. Reactive teams ignore threats, assuming 'We'll deal with it if it happens,' which often leads to project failure." },
                        { name: "Contingency vs Panic", desc: "A proactive team has a 'Plan B' (Contingency) ready to execute immediately if a risk triggers. A reactive team has no plan and must improvise a solution while the project timeline is already in jeopardy." },
                        { name: "Cost Impact", desc: "Proactive management is an investment that reduces expensive downstream rework. Reactive management 'saves' time initially but leads to massive costs later when critical bugs or scope gaps are found too late." },
                        { name: "Organizational Maturity", desc: "Highly mature teams (CMMI Level 4/5) are strictly proactive. They treat risk as a manageable part of engineering. Immature teams are almost entirely reactive, leading to unpredictable and often low-quality results." }
                    ],
                    diag: "Reactive: [Risk Happens] -> [Firefight] -> [Delay]\nProactive: [Plan] -> [Avoid/Monitor] -> [Success]",
                    ex: "A reactive team waits for an API to crash before thinking about error handling. A proactive team builds a 'Circuit Breaker' and a mock service during week 1 to ensure the app stays stable even if the API fails.",
                    conc: "In summary, the choice between reactive and proactive management is the choice between crisis and control. Proactive risk management is the hallmark of a professional and successful software engineering organization."
                }
            }
        ];
        
        // State Management
        let filters = {
            search: '',
            module: 'all',
            marks: 'all'
        };
        let revisionMode = false;

        // DOM Elements
        const container = document.getElementById('questionsContainer');
        const searchInput = document.getElementById('searchInput');
        const moduleFilter = document.getElementById('moduleFilter');
        const marksFilter = document.getElementById('marksFilter');
        const revisionToggle = document.getElementById('revisionToggle');
        const showAllBtn = document.getElementById('showAllBtn');
        const hideAllBtn = document.getElementById('hideAllBtn');
        const scrollTop = document.getElementById('scrollTop');
        
        // Functions
        function renderQuestions() {
            const filtered = questionData.filter(item => {
                const matchesSearch = item.q.toLowerCase().includes(filters.search.toLowerCase()) || 
                                    (typeof item.ans === 'string' ? item.ans : JSON.stringify(item.ans)).toLowerCase().includes(filters.search.toLowerCase());
                const matchesModule = filters.module === 'all' || item.module == filters.module;
                const matchesMarks = filters.marks === 'all' || item.marks == filters.marks;
                return matchesSearch && matchesModule && matchesMarks;
            });

            container.innerHTML = '';
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">No questions found matching your criteria.</div>';
                return;
            }

            // Group by module for display
            const modules = [...new Set(filtered.map(f => f.module))].sort();
            
            modules.forEach(mod => {
                const section = document.createElement('div');
                section.className = 'module-section animate-fade';
                section.innerHTML = `<h2 class="module-title" id="mod-${mod}">Module ${String.fromCharCode(72 + mod).replace('I', 'I').replace('J', 'II').replace('K', 'III').replace('L', 'IV').replace('M', 'V')}</h2>`;
                
                // 2 Marks sub-section
                const m2 = filtered.filter(f => f.module === mod && f.marks === 2);
                if (m2.length > 0) {
                    section.innerHTML += `<div class="section-header"><span>🔹</span> 2 MARK QUESTIONS</div>`;
                    m2.forEach(q => section.appendChild(createCard(q)));
                }

                // 8 Marks sub-section
                const m8 = filtered.filter(f => f.module === mod && f.marks === 8);
                if (m8.length > 0) {
                    section.innerHTML += `<div class="section-header"><span>🔹</span> 8 MARK QUESTIONS</div>`;
                    m8.forEach(q => section.appendChild(createCard(q)));
                }

                container.appendChild(section);
            });
        }

        function createCard(data) {
            const card = document.createElement('div');
            card.className = `card ${revisionMode ? 'revision-mode-item' : ''}`;
            card.id = `card-${data.id}`;
            
            const badgeClass = data.marks === 2 ? 'badge-2m' : 'badge-8m';

            let answerHtml = '';
            if (data.marks === 2) {
                answerHtml = `<p class="ans-text">${data.ans}</p>`;
            } else {
                const a = data.ans;
                answerHtml = `
                    <div class="ans-section">
                        <span class="section-title">1. DEFINITION</span>
                        <p class="ans-text">${a.def}</p>
                    </div>
                    <div class="ans-section">
                        <span class="section-title">2. MAIN ANSWER</span>
                        <div class="ans-list">
                            ${a.points.map(p => `
                                <div class="point-item">
                                    <span class="point-name">${p.name}:</span> ${p.desc}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="ans-section">
                        <span class="section-title">3. DIAGRAM / STRUCTURE</span>
                        <div class="diagram-box">${a.diag}</div>
                    </div>
                    <div class="ans-section">
                        <span class="section-title">4. EXAMPLE / APPLICATION</span>
                        <p class="ans-text">${a.ex}</p>
                    </div>
                    <div class="ans-section">
                        <span class="section-title">5. CONCLUSION</span>
                        <p class="ans-text">${a.conc}</p>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="card-header">
                    <div class="question-text">
                        <span class="badge ${badgeClass}">${data.marks} Marks</span>
                        ${data.q}
                    </div>
                    <div class="card-actions">
                        <span class="arrow">▼</span>
                    </div>
                </div>
                <div class="card-body">
                    ${answerHtml}
                </div>
            `;

            // Expand logic
            card.querySelector('.card-header').addEventListener('click', (e) => {
                if (revisionMode) {
                    card.classList.toggle('revealed');
                } else {
                    card.classList.toggle('expanded');
                }
            });

            return card;
        }

        // Event Listeners
        searchInput.addEventListener('input', (e) => {
            filters.search = e.target.value;
            renderQuestions();
        });

        moduleFilter.addEventListener('change', (e) => {
            filters.module = e.target.value;
            renderQuestions();
        });

        marksFilter.addEventListener('change', (e) => {
            filters.marks = e.target.value;
            renderQuestions();
        });

        revisionToggle.addEventListener('click', () => {
            revisionMode = !revisionMode;
            revisionToggle.classList.toggle('active');
            document.body.classList.toggle('revision-mode', revisionMode);
            renderQuestions();
        });

        showAllBtn.addEventListener('click', () => {
            document.querySelectorAll('.card').forEach(c => c.classList.add('expanded'));
        });

        hideAllBtn.addEventListener('click', () => {
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('expanded');
                c.classList.remove('revealed');
            });
        });

        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollTop.classList.add('visible');
            } else {
                scrollTop.classList.remove('visible');
            }
        });

        scrollTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Initialize
        document.getElementById('totalBadge').innerText = questionData.length;
        renderQuestions();

    </script>
</body>
</html>
